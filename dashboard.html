        // HEADER COMPONENTS
        // ==========================================
        const BentoButton = ({ onClick, isOpen = false }) => {
            const [isHovered, setIsHovered] = useState(false);
            return (
                <button
                    onClick={onClick}
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                    style={{
                        width: '32px',
                        height: '32px',
                        background: isHovered || isOpen ? colors.purple700 : colors.purple500,
                        border: 'none',
                        borderRadius: '4px',
                        cursor: 'pointer',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        padding: '4px',
                        transition: 'background 0.15s ease',
                    }}
                >
                    <AppsIcon />
                </button>
            );
        };

        const HeaderIconButton = ({ icon, onClick, hasAlert = false }) => {
            const [isHovered, setIsHovered] = useState(false);
            return (
                <button
                    onClick={onClick}
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                    style={{
                        position: 'relative',
                        width: '36px',
                        height: '36px',
                        background: isHovered ? colors.purple700 : colors.purple500,
                        border: 'none',
                        borderRadius: '50%',
                        cursor: 'pointer',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        padding: 0,
                        transition: 'background 0.15s ease',
                    }}

                    {icon}
                    {hasAlert && (
                        <div style={{
                            position: 'absolute',
                            top: '0px',
                            right: '0px',
                            width: '10px',
                            height: '10px',
                            background: colors.red500,
                            borderRadius: '50%',
                            border: `2px solid ${colors.purple500}`,
                        }} />
                    )}
                </button>
            );
        };

            const [isHovered, setIsHovered] = useState(false);

                <button

                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}

                        display: 'flex',
                        alignItems: 'center',
                        gap: '12px',
                        maxWidth: '380px',
                        padding: '8px 12px',

                        fontFamily: "'Roboto', sans-serif",

                        fontFamily: "'Roboto', sans-serif",
                        fontWeight: 500,
                        fontSize: '16px',
                        lineHeight: '20px',

                    borderRadius: '50%',

                    position: 'absolute',
                    top: '4px',
                    left: '4px',
                    width: `${size - 8}px`,
                    height: `${size - 8}px`,
                    borderRadius: '50%',
                    background: colors.purple700,
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',

                                        fontFamily: "'Roboto', sans-serif",
                                        fontSize: '18px',
                                        fontWeight: 500,
                                        color: colors.black,
                                    }}>
                                        Recent Patients
                                    </h2>
                                    <Button variant="text">View All</Button>
                                </div>
                                <Table>
                                    <TableHead>
                                        <TableRow>
                                            <TableHeader>Patient Name</TableHeader>
                                            <TableHeader>MRN</TableHeader>
                                            <TableHeader>Status</TableHeader>
                                            <TableHeader>Admit Date</TableHeader>
                                        </TableRow>
                                    </TableHead>
                                    <TableBody>
                                        {recentPatients.map(patient => (
                                            <TableRow key={patient.id} onClick={() => alert(`View ${patient.name}`)}>
                                                <TableCell>{patient.name}</TableCell>
                                                <TableCell>{patient.mrn}</TableCell>
                                                <TableCell>
                                                    <StatusBadge status={patient.status} />
                                                </TableCell>
                                                <TableCell>{patient.admitDate}</TableCell>
                                            </TableRow>
                                        ))}
                                    </TableBody>
                                </Table>
                            </Card>

                            {/* Upcoming Appointments */}
                            <Card>
                                <div style={{
                                    display: 'flex',
                                    justifyContent: 'space-between',
                                    alignItems: 'center',
                                    marginBottom: '16px',
                                }}>
                                    <h2 style={{
                                        fontFamily: "'Roboto', sans-serif",
                                        fontSize: '18px',
                                        fontWeight: 500,
                                        color: colors.black,
                                    }}>
                                        Today's Schedule
                                    </h2>
                                    <Button variant="text">View All</Button>
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                    {upcomingAppointments.map(appt => (
                                        <div 
                                            key={appt.id}
                                            style={{
                                                display: 'flex',
                                                gap: '12px',
                                                padding: '12px',
                                                background: colors.gray02,
                                                borderRadius: '8px',
                                                cursor: 'pointer',
                                                transition: 'background 0.15s ease',
                                            }}
                                            onMouseEnter={(e) => e.currentTarget.style.background = colors.purple50}
                                            onMouseLeave={(e) => e.currentTarget.style.background = colors.gray02}
                                        >
                                            <div style={{
                                                width: '60px',
                                                flexShrink: 0,
                                                fontFamily: "'Roboto', sans-serif",
                                                fontSize: '14px',
                                                fontWeight: 500,
                                                color: colors.purple700,
                                            }}>
                                                {appt.time}
                                            </div>
                                            <div style={{ flex: 1 }}>
                                                <p style={{
                                                    fontFamily: "'Roboto', sans-serif",
                                                    fontSize: '14px',
                                                    fontWeight: 500,
                                                    color: colors.black,
                                                    marginBottom: '2px',
                                                }}>
                                                    {appt.patient}
                                                </p>
                                                <p style={{
                                                    fontFamily: "'Roboto', sans-serif",
                                                    fontSize: '12px',
                                                    color: colors.gray06,
                                                }}>
                                                    {appt.type} • {appt.provider}
                                                </p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </Card>
                        </div>

                        {/* Quick Actions */}
                        <div style={{ marginTop: '24px' }}>
                            <Card>
                                <h2 style={{
                                    fontFamily: "'Roboto', sans-serif",
                                    fontSize: '18px',
                                    fontWeight: 500,
                                    color: colors.black,
                                    marginBottom: '16px',
                                }}>
                                    Quick Actions
                                </h2>
                                <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap' }}>
                                    <Button variant="outlined">New Admission</Button>
                                    <Button variant="outlined">Schedule Appointment</Button>
                                    <Button variant="outlined">Create Note</Button>
                                    <Button variant="outlined">Run Report</Button>
                                    <Button variant="outlined">Send Message</Button>
                                </div>
                            </Card>
                        </div>
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Field - Kipu Design System</title>
    <link rel="stylesheet" href="../shared-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;

        // Kipu Design System Colors (from Figma)
        const colors = {
            blue500: '#1565C0',
            blue700: '#0F4888',
            white: '#FFFFFF',
            gray02: '#F0F0F0',
            gray04: '#CCCCCC',
            gray05: '#999999',
            gray06: '#666666',
            gray07: '#333333',
            error: '#E50000',
        };

        // Text Field Component - Matching Figma Design System
        // Figma specs: Height 46px, Border-radius 4px, Padding 14px 10px 12px 14px
        const TextField = ({ 
            label,
            value,
            onChange,
            placeholder = 'Placeholder',
            helperText,
            error = false,
            errorText,
            disabled = false,
            required = false,
            leadingIcon,
            trailingIcon,
            type = 'text',
            fullWidth = false,
        }) => {
            const [isFocused, setIsFocused] = useState(false);
            const hasValue = value && value.length > 0;

            // Container wraps everything
            const containerStyles = {
                display: 'flex',
                flexDirection: 'column',
                gap: '8px',
                width: fullWidth ? '100%' : '260px',
                position: 'relative',
            };

            // Field styles from Figma: 46px height, border changes on state
            // Default: 1px solid #CCCCCC
            // Focused: 2px solid #1565C0 (no shadow variant) 
            // Disabled: 1px solid #CCCCCC, background #F0F0F0
            const getBorderStyle = () => {
                if (error) return `2px solid ${colors.error}`;
                if (isFocused) return `2px solid ${colors.blue500}`;
                return `1px solid ${colors.gray04}`;
            };

            const fieldStyles = {
                display: 'flex',
                alignItems: 'center',
                gap: '8px',
                height: '46px',
                paddingTop: '14px',
                paddingBottom: '12px',
                paddingLeft: leadingIcon ? '10px' : '14px',
                paddingRight: trailingIcon ? '10px' : '10px',
                background: disabled ? colors.gray02 : colors.white,
                border: getBorderStyle(),
                borderRadius: '4px',
                boxSizing: 'border-box',
                transition: 'border-color 0.2s ease, border-width 0.1s ease, box-shadow 0.2s ease',
                cursor: disabled ? 'not-allowed' : 'text',
            };

            // Input styles from Figma: Roboto Regular 16px, line-height 20px
            const inputStyles = {
                flex: 1,
                border: 'none',
                outline: 'none',
                background: 'transparent',
                fontFamily: "'Roboto', sans-serif",
                fontWeight: 400,
                fontSize: '16px',
                lineHeight: '20px',
                color: disabled ? colors.gray05 : (hasValue ? colors.gray07 : colors.gray05),
                cursor: disabled ? 'not-allowed' : 'text',
                minWidth: 0,
            };

            // Label styles from Figma: 
            // Position: absolute, top -6px, left 12px
            // Background: white with padding 4px 2px
            // Font: Roboto Regular 12px, line-height 14px
            // Color: #666666 default, #1565C0 focused, #E50000 error
            const labelStyles = {
                position: 'absolute',
                top: '-6px',
                left: '12px',
                display: 'flex',
                alignItems: 'center',
                gap: '2px',
                height: '14px',
                paddingLeft: '2px',
                paddingRight: '2px',
                paddingTop: '4px',
                paddingBottom: '4px',
                background: disabled ? colors.gray02 : colors.white,
                fontFamily: "'Roboto', sans-serif",
                fontWeight: 400,
                fontSize: '12px',
                lineHeight: '14px',
                color: error ? colors.error : (isFocused ? colors.blue500 : colors.gray06),
                whiteSpace: 'nowrap',
                transition: 'color 0.2s ease',
            };

            // Helper text styles
            const helperStyles = {
                fontFamily: "'Roboto', sans-serif",
                fontWeight: 400,
                fontSize: '12px',
                lineHeight: '14px',
                color: error ? colors.error : colors.gray06,
                paddingLeft: '14px',
                marginTop: '-4px',
            };

            // Icon styles from Figma: 18x18px icons
            const iconStyles = {
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                color: isFocused ? colors.blue500 : colors.gray05,
                flexShrink: 0,
                width: '18px',
                height: '18px',
            };

            return (
                <div style={containerStyles}>
                    <div 
                        style={fieldStyles}
                        onClick={() => !disabled && document.getElementById(`input-${label}`)?.focus()}
                    >
                        {leadingIcon && <span style={iconStyles}>{leadingIcon}</span>}
                        <input
                            id={`input-${label}`}
                            type={type}
                            value={value}
                            onChange={(e) => onChange(e.target.value)}
                            placeholder={placeholder}
                            disabled={disabled}
                            style={inputStyles}
                            onFocus={() => setIsFocused(true)}
                            onBlur={() => setIsFocused(false)}
                        />
                        {trailingIcon && <span style={iconStyles}>{trailingIcon}</span>}
                    </div>
                    {label && (
                        <div style={labelStyles}>
                            <span>{label}</span>
                            {required && <span>*</span>}
                        </div>
                    )}
                    {(helperText || errorText) && (
                        <span style={helperStyles}>{error ? errorText : helperText}</span>
                    )}
                </div>
            );
        };

        // Icons - 18x18px as per Figma specs
        const SearchIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
        );

        const VisibilityIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
            </svg>
        );

        const ErrorIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#E50000">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
        );

        const CalendarIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/>
            </svg>
        );

        // Demo App
        const App = () => {
            const [values, setValues] = useState({
                basic: '',
                withPlaceholder: '',
                withHelper: '',
                error: 'Invalid input',
                disabled: 'Disabled value',
                password: '',
                search: '',
                required: '',
            });

            const updateValue = (key, value) => {
                setValues(prev => ({ ...prev, [key]: value }));
            };

            return (
                <div className="page-container">
                    <a href="../../kipu-design-system-components.html" className="back-link">
                        ← Back to Components
                    </a>
                    
                    <header className="component-header">
                        <div className="breadcrumb">
                            <a href="../../kipu-design-system-components.html">Components</a>
                            <span>/</span>
                            <span>Forms</span>
                            <span>/</span>
                            <span>Text Field</span>
                        </div>
                        <h1>Text Field</h1>
                        <p className="description">
                            Text fields allow users to enter and edit text. They typically appear in forms 
                            and dialogs. The text field has a floating label that moves above the input.
                        </p>
                    </header>

                    <section className="component-section">
                        <h2>Basic Examples</h2>
                        <p style={{ marginBottom: '1rem', color: '#666', fontSize: '14px' }}>
                            Height: 46px • Border: 1px #CCC (default), 2px #1565C0 (focused) • Border-radius: 4px • Disabled: #F0F0F0 bg
                        </p>
                        <div className="preview-area" style={{ flexDirection: 'column', gap: '2rem', alignItems: 'flex-start', paddingTop: '2rem' }}>
                            <TextField 
                                label="Label"
                                value={values.basic}
                                onChange={(v) => updateValue('basic', v)}
                                required
                            />
                            <TextField 
                                label="Email"
                                value={values.withPlaceholder}
                                onChange={(v) => updateValue('withPlaceholder', v)}
                                placeholder="Enter your email"
                            />
                        </div>
                    </section>

                    <section className="component-section">
                        <h2>States</h2>
                        <div className="preview-area" style={{ flexDirection: 'column', gap: '2rem', alignItems: 'flex-start', paddingTop: '2rem' }}>
                            <TextField 
                                label="Default"
                                value=""
                                onChange={() => {}}
                            />
                            <TextField 
                                label="With helper text"
                                value={values.withHelper}
                                onChange={(v) => updateValue('withHelper', v)}
                                helperText="This is helper text"
                            />
                            <TextField 
                                label="Required field"
                                value={values.required}
                                onChange={(v) => updateValue('required', v)}
                                required
                            />
                            <TextField 
                                label="Error state"
                                value={values.error}
                                onChange={(v) => updateValue('error', v)}
                                error
                                errorText="Please enter a valid value"
                            />
                            <TextField 
                                label="Disabled"
                                value={values.disabled}
                                onChange={() => {}}
                                disabled
                            />
                        </div>
                    </section>

                    <section className="component-section">
                        <h2>With Icons</h2>
                        <div className="preview-area" style={{ flexDirection: 'column', gap: '2rem', alignItems: 'flex-start', paddingTop: '2rem' }}>
                            <TextField 
                                label="Search"
                                value={values.search}
                                onChange={(v) => updateValue('search', v)}
                                leadingIcon={<SearchIcon />}
                                placeholder="Search patients..."
                            />
                            <TextField 
                                label="Password"
                                value={values.password}
                                onChange={(v) => updateValue('password', v)}
                                type="password"
                                trailingIcon={<VisibilityIcon />}
                                placeholder="Enter password"
                            />
                            <TextField 
                                label="Error with icon"
                                value="Invalid"
                                onChange={() => {}}
                                error
                                errorText="Invalid email format"
                                trailingIcon={<ErrorIcon />}
                            />
                        </div>
                    </section>

                    <section className="component-section">
                        <h2>Full Width</h2>
                        <div className="preview-area" style={{ flexDirection: 'column', width: '100%', paddingTop: '2rem' }}>
                            <TextField 
                                label="Full width input"
                                value=""
                                onChange={() => {}}
                                fullWidth
                                helperText="This input takes the full container width"
                            />
                        </div>
                    </section>

                    <section className="component-section">
                        <h2>Design Specifications</h2>
                        <table className="props-table">
                            <thead>
                                <tr>
                                    <th>Property</th>
                                    <th>Value</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Height</td>
                                    <td><code>46px</code></td>
                                </tr>
                                <tr>
                                    <td>Border (default)</td>
                                    <td><code>1px solid #CCCCCC</code></td>
                                </tr>
                                <tr>
                                    <td>Border (focused)</td>
                                    <td><code>2px solid #1565C0</code> (Blue 500)</td>
                                </tr>
                                <tr>
                                    <td>Border (error)</td>
                                    <td><code>2px solid #E50000</code></td>
                                </tr>
                                <tr>
                                    <td>Border Radius</td>
                                    <td><code>4px</code></td>
                                </tr>
                                <tr>
                                    <td>Padding</td>
                                    <td><code>14px 10px 12px 14px</code> (top right bottom left)</td>
                                </tr>
                                <tr>
                                    <td>Background (default)</td>
                                    <td><code>#FFFFFF</code> (White)</td>
                                </tr>
                                <tr>
                                    <td>Background (disabled)</td>
                                    <td><code>#F0F0F0</code> (Gray 02)</td>
                                </tr>
                                <tr>
                                    <td>Input Font</td>
                                    <td><code>Roboto Regular, 16px, line-height 20px</code></td>
                                </tr>
                                <tr>
                                    <td>Label Font</td>
                                    <td><code>Roboto Regular, 12px, line-height 14px</code></td>
                                </tr>
                                <tr>
                                    <td>Placeholder Color</td>
                                    <td><code>#999999</code> (Gray 05)</td>
                                </tr>
                                <tr>
                                    <td>Label Color (default)</td>
                                    <td><code>#666666</code> (Gray 06)</td>
                                </tr>
                                <tr>
                                    <td>Label Color (focused)</td>
                                    <td><code>#1565C0</code> (Blue 500)</td>
                                </tr>
                                <tr>
                                    <td>Icon Size</td>
                                    <td><code>18×18px</code></td>
                                </tr>
                            </tbody>
                        </table>
                    </section>

                    <section className="component-section">
                        <h2>Props</h2>
                        <table className="props-table">
                            <thead>
                                <tr>
                                    <th>Prop</th>
                                    <th>Type</th>
                                    <th>Default</th>
                                    <th>Description</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><code>label</code></td>
                                    <td><code>string</code></td>
                                    <td>-</td>
                                    <td>Floating label text</td>
                                </tr>
                                <tr>
                                    <td><code>value</code></td>
                                    <td><code>string</code></td>
                                    <td>Required</td>
                                    <td>Input value (controlled)</td>
                                </tr>
                                <tr>
                                    <td><code>onChange</code></td>
                                    <td><code>function</code></td>
                                    <td>Required</td>
                                    <td>Called when value changes</td>
                                </tr>
                                <tr>
                                    <td><code>placeholder</code></td>
                                    <td><code>string</code></td>
                                    <td><code>'Placeholder'</code></td>
                                    <td>Placeholder text</td>
                                </tr>
                                <tr>
                                    <td><code>error</code></td>
                                    <td><code>boolean</code></td>
                                    <td><code>false</code></td>
                                    <td>Show error state</td>
                                </tr>
                                <tr>
                                    <td><code>required</code></td>
                                    <td><code>boolean</code></td>
                                    <td><code>false</code></td>
                                    <td>Show required asterisk</td>
                                </tr>
                                <tr>
                                    <td><code>helperText</code></td>
                                    <td><code>string</code></td>
                                    <td>-</td>
                                    <td>Helper text below input</td>
                                </tr>
                                <tr>
                                    <td><code>leadingIcon</code></td>
                                    <td><code>ReactNode</code></td>
                                    <td>-</td>
                                    <td>Icon at start of input</td>
                                </tr>
                                <tr>
                                    <td><code>trailingIcon</code></td>
                                    <td><code>ReactNode</code></td>
                                    <td>-</td>
                                    <td>Icon at end of input</td>
                                </tr>
                                <tr>
                                    <td><code>fullWidth</code></td>
                                    <td><code>boolean</code></td>
                                    <td><code>false</code></td>
                                    <td>Take full container width</td>
                                </tr>
                            </tbody>
                        </table>
                    </section>

                    <section className="component-section">
                        <h2>Usage</h2>
                        <div className="code-block">
{`import { TextField } from '@kipu/design-system';

// Basic usage
const [email, setEmail] = useState('');

<TextField 
  label="Email"
  value={email}
  onChange={setEmail}
  required
/>

// With validation
<TextField 
  label="Email"
  value={email}
  onChange={setEmail}
  error={!isValidEmail(email)}
  errorText="Please enter a valid email"
/>

// With icons
<TextField 
  label="Search"
  value={query}
  onChange={setQuery}
  leadingIcon={<SearchIcon />}
/>`}
                        </div>
                    </section>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

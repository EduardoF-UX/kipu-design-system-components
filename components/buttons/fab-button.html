<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAB (Floating Action Button) - Kipu Design System</title>
    <link rel="stylesheet" href="../shared-styles.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;

        // FAB Component
        const FAB = ({ 
            icon,
            label,
            variant = 'primary',
            size = 'regular',
            extended = false,
            onClick,
            disabled = false,
        }) => {
            const [isHovered, setIsHovered] = useState(false);

            const sizes = {
                small: { size: 40, iconSize: 20 },
                regular: { size: 56, iconSize: 24 },
                large: { size: 96, iconSize: 36 },
            };

            const { size: btnSize, iconSize } = sizes[size];

            const baseStyles = {
                display: 'inline-flex',
                alignItems: 'center',
                justifyContent: 'center',
                gap: extended ? '12px' : 0,
                width: extended ? 'auto' : btnSize,
                height: btnSize,
                padding: extended ? '0 20px' : 0,
                borderRadius: extended ? '28px' : '50%',
                cursor: disabled ? 'not-allowed' : 'pointer',
                transition: 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)',
                border: 'none',
                outline: 'none',
                fontFamily: 'inherit',
                fontSize: '14px',
                fontWeight: 500,
                opacity: disabled ? 0.6 : 1,
                boxShadow: isHovered && !disabled 
                    ? '0 6px 20px rgba(0, 0, 0, 0.25)' 
                    : '0 3px 12px rgba(0, 0, 0, 0.15)',
                transform: isHovered && !disabled ? 'scale(1.05)' : 'scale(1)',
            };

            const variantStyles = {
                primary: {
                    background: '#1565C0',
                    color: '#FFFFFF',
                },
                secondary: {
                    background: '#CADFFE',
                    color: '#0F4888',
                },
                tertiary: {
                    background: '#FFFFFF',
                    color: '#1565C0',
                },
                surface: {
                    background: '#f8fafc',
                    color: '#1565C0',
                },
            };

            return (
                <button
                    style={{ ...baseStyles, ...variantStyles[variant] }}
                    onClick={onClick}
                    disabled={disabled}
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                >
                    <span style={{ display: 'flex', width: iconSize, height: iconSize }}>
                        {icon}
                    </span>
                    {extended && label && <span>{label}</span>}
                </button>
            );
        };

        // Icons
        const AddIcon = () => (
            <svg viewBox="0 0 24 24" fill="currentColor" width="100%" height="100%">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
        );

        const EditIcon = () => (
            <svg viewBox="0 0 24 24" fill="currentColor" width="100%" height="100%">
                <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
            </svg>
        );

        const NavigationIcon = () => (
            <svg viewBox="0 0 24 24" fill="currentColor" width="100%" height="100%">
                <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/>
            </svg>
        );

        // Demo App
        const App = () => {
            return (
                <div className="page-container">
                    <a href="../../kipu-design-system-components.html" className="back-link">
                        ← Back to Components
                    </a>
                    
                    <header className="component-header">
                        <div className="breadcrumb">
                            <a href="../../kipu-design-system-components.html">Components</a>
                            <span>/</span>
                            <span>Buttons</span>
                            <span>/</span>
                            <span>FAB Icons</span>
                        </div>
                        <h1>Floating Action Button (FAB)</h1>
                        <p className="description">
                            FABs help people take primary actions. They're used to represent the most 
                            important action on a screen, such as Create or Compose.
                        </p>
                    </header>

                    <section className="component-section">
                        <h2>Variants</h2>
                        <div className="preview-area">
                            <div className="preview-column">
                                <span className="variant-label">Primary</span>
                                <FAB icon={<AddIcon />} variant="primary" />
                            </div>
                            <div className="preview-column">
                                <span className="variant-label">Secondary</span>
                                <FAB icon={<AddIcon />} variant="secondary" />
                            </div>
                            <div className="preview-column">
                                <span className="variant-label">Tertiary</span>
                                <FAB icon={<AddIcon />} variant="tertiary" />
                            </div>
                            <div className="preview-column">
                                <span className="variant-label">Surface</span>
                                <FAB icon={<AddIcon />} variant="surface" />
                            </div>
                        </div>
                    </section>

                    <section className="component-section">
                        <h2>Sizes</h2>
                        <div className="preview-area">
                            <div className="preview-column">
                                <span className="variant-label">Small (40px)</span>
                                <FAB icon={<AddIcon />} size="small" />
                            </div>
                            <div className="preview-column">
                                <span className="variant-label">Regular (56px)</span>
                                <FAB icon={<AddIcon />} size="regular" />
                            </div>
                            <div className="preview-column">
                                <span className="variant-label">Large (96px)</span>
                                <FAB icon={<AddIcon />} size="large" />
                            </div>
                        </div>
                    </section>

                    <section className="component-section">
                        <h2>Extended FAB</h2>
                        <p style={{ marginBottom: '1rem', color: '#666' }}>
                            Extended FABs include a text label in addition to the icon.
                        </p>
                        <div className="preview-area" style={{ flexDirection: 'column', gap: '1rem' }}>
                            <FAB icon={<AddIcon />} label="Create" extended variant="primary" />
                            <FAB icon={<EditIcon />} label="Compose" extended variant="secondary" />
                            <FAB icon={<NavigationIcon />} label="Navigate" extended variant="tertiary" />
                        </div>
                    </section>

                    <section className="component-section">
                        <h2>States</h2>
                        <div className="state-grid">
                            <div className="state-item">
                                <span className="label">Enabled</span>
                                <FAB icon={<AddIcon />} variant="primary" />
                            </div>
                            <div className="state-item">
                                <span className="label">Hover</span>
                                <div style={{ 
                                    width: 56, height: 56, borderRadius: '50%', 
                                    background: '#1565C0', display: 'flex', 
                                    alignItems: 'center', justifyContent: 'center',
                                    boxShadow: '0 6px 20px rgba(0, 0, 0, 0.25)',
                                    transform: 'scale(1.05)',
                                    color: 'white'
                                }}>
                                    <AddIcon />
                                </div>
                            </div>
                            <div className="state-item">
                                <span className="label">Disabled</span>
                                <FAB icon={<AddIcon />} variant="primary" disabled />
                            </div>
                        </div>
                    </section>

                    <section className="component-section">
                        <h2>Positioning Example</h2>
                        <p style={{ marginBottom: '1rem', color: '#666' }}>
                            FABs are typically positioned in the bottom-right corner of the screen.
                        </p>
                        <div className="preview-area" style={{ position: 'relative', height: '200px' }}>
                            <div style={{ 
                                position: 'absolute', 
                                bottom: '16px', 
                                right: '16px' 
                            }}>
                                <FAB icon={<AddIcon />} variant="primary" />
                            </div>
                            <span style={{ color: '#999' }}>Content area</span>
                        </div>
                    </section>

                    <section className="component-section">
                        <h2>Props</h2>
                        <table className="props-table">
                            <thead>
                                <tr>
                                    <th>Prop</th>
                                    <th>Type</th>
                                    <th>Default</th>
                                    <th>Description</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><code>icon</code></td>
                                    <td><code>ReactNode</code></td>
                                    <td>Required</td>
                                    <td>The icon to display</td>
                                </tr>
                                <tr>
                                    <td><code>label</code></td>
                                    <td><code>string</code></td>
                                    <td>-</td>
                                    <td>Text label (for extended FAB)</td>
                                </tr>
                                <tr>
                                    <td><code>variant</code></td>
                                    <td><code>'primary' | 'secondary' | 'tertiary' | 'surface'</code></td>
                                    <td><code>'primary'</code></td>
                                    <td>Color variant</td>
                                </tr>
                                <tr>
                                    <td><code>size</code></td>
                                    <td><code>'small' | 'regular' | 'large'</code></td>
                                    <td><code>'regular'</code></td>
                                    <td>Size of the FAB</td>
                                </tr>
                                <tr>
                                    <td><code>extended</code></td>
                                    <td><code>boolean</code></td>
                                    <td><code>false</code></td>
                                    <td>Show as extended FAB with label</td>
                                </tr>
                                <tr>
                                    <td><code>disabled</code></td>
                                    <td><code>boolean</code></td>
                                    <td><code>false</code></td>
                                    <td>Disable the FAB</td>
                                </tr>
                            </tbody>
                        </table>
                    </section>

                    <section className="component-section">
                        <h2>Usage</h2>
                        <div className="code-block">
{`import { FAB } from '@kipu/design-system';
import { Add, Edit } from '@kipu/icons';

// Basic FAB
<FAB icon={<Add />} onClick={handleCreate} />

// Extended FAB
<FAB 
  icon={<Edit />} 
  label="Compose" 
  extended 
  onClick={handleCompose}
/>

// Different sizes
<FAB icon={<Add />} size="small" />
<FAB icon={<Add />} size="large" />

// Positioned FAB
<div style={{ position: 'fixed', bottom: 24, right: 24 }}>
  <FAB icon={<Add />} onClick={handleCreate} />
</div>`}
                        </div>
                    </section>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

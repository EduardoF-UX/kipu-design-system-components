<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Left Sidebar Navigation - Kipu Design System</title>
    <link rel="stylesheet" href="../shared-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;

        // Kipu Design System Colors (from Figma)
        const colors = {
            white: '#FFFFFF',
            black: '#000000',
            gray03: '#ECECEC',
            gray06: '#666666',
            lightBlue100: '#EFF5FF',
            purple900: '#2D0A54',
        };

        // Icons (matching Figma design exactly)
        // Dashboard icon: Home Outlined
        const HomeIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 5.69L17 10.19V18H15V12H9V18H7V10.19L12 5.69ZM12 3L2 12H5V20H11V14H13V20H19V12H22L12 3Z"/>
            </svg>
        );

        // Apps icon: Dashboard Customize
        const DashboardIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 3H11V11H3V3ZM3 13H11V21H3V13ZM13 3H21V11H13V3ZM13 13H17V17H13V13ZM19 13H21V15H19V13ZM13 19H15V21H13V19ZM17 19H21V21H17V19ZM19 15H21V19H19V15ZM15 15H17V19H15V15Z"/>
            </svg>
        );

        // Analytics icon: Timeline
        const AnalyticsIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M23 8C23 9.1 22.1 10 21 10C20.82 10 20.65 9.98 20.49 9.93L16.93 13.48C16.98 13.64 17 13.82 17 14C17 15.1 16.1 16 15 16C13.9 16 13 15.1 13 14C13 13.82 13.02 13.64 13.07 13.48L10.52 10.93C10.36 10.98 10.18 11 10 11C9.82 11 9.64 10.98 9.48 10.93L4.93 15.49C4.98 15.65 5 15.82 5 16C5 17.1 4.1 18 3 18C1.9 18 1 17.1 1 16C1 14.9 1.9 14 3 14C3.18 14 3.35 14.02 3.51 14.07L8.07 9.52C8.02 9.36 8 9.18 8 9C8 7.9 8.9 7 10 7C11.1 7 12 7.9 12 9C12 9.18 11.98 9.36 11.93 9.52L14.48 12.07C14.64 12.02 14.82 12 15 12C15.18 12 15.36 12.02 15.52 12.07L19.07 8.51C19.02 8.35 19 8.18 19 8C19 6.9 19.9 6 21 6C22.1 6 23 6.9 23 8Z"/>
            </svg>
        );

        // Admin icon: Settings
        const SettingsIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19.14 12.94C19.18 12.63 19.2 12.31 19.2 12C19.2 11.69 19.18 11.37 19.14 11.06L21.16 9.48C21.34 9.34 21.39 9.07 21.27 8.87L19.27 5.37C19.15 5.17 18.89 5.1 18.69 5.17L16.36 6.1C15.86 5.72 15.33 5.4 14.74 5.16L14.4 2.67C14.36 2.45 14.16 2.28 13.92 2.28H9.92C9.68 2.28 9.49 2.45 9.45 2.67L9.11 5.16C8.52 5.4 7.99 5.72 7.49 6.1L5.16 5.17C4.96 5.1 4.7 5.17 4.58 5.37L2.58 8.87C2.46 9.07 2.51 9.34 2.69 9.48L4.71 11.06C4.67 11.37 4.65 11.69 4.65 12C4.65 12.31 4.67 12.63 4.71 12.94L2.69 14.52C2.51 14.66 2.46 14.93 2.58 15.13L4.58 18.63C4.7 18.83 4.96 18.9 5.16 18.83L7.49 17.9C7.99 18.28 8.52 18.6 9.11 18.84L9.45 21.33C9.49 21.55 9.68 21.72 9.92 21.72H13.92C14.16 21.72 14.36 21.55 14.4 21.33L14.74 18.84C15.33 18.6 15.86 18.28 16.36 17.9L18.69 18.83C18.89 18.9 19.15 18.83 19.27 18.63L21.27 15.13C21.39 14.93 21.34 14.66 21.16 14.52L19.14 12.94ZM11.92 15.5C10 15.5 8.42 13.92 8.42 12C8.42 10.08 10 8.5 11.92 8.5C13.84 8.5 15.42 10.08 15.42 12C15.42 13.92 13.84 15.5 11.92 15.5Z"/>
            </svg>
        );

        // Knowledge icon: School
        const KnowledgeIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M5 13.18V17.18L12 21L19 17.18V13.18L12 17L5 13.18ZM12 3L1 9L12 15L21 10.09V17H23V9L12 3Z"/>
            </svg>
        );

        const ChevronDownIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
            </svg>
        );

        const ChevronUpIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/>
            </svg>
        );

        const CollapseIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
        );

        const ExpandIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M4 11h12.17l-5.59-5.59L12 4l8 8-8 8-1.41-1.41L16.17 13H4v-2z"/>
            </svg>
        );

        // Navigation Item Component (child item in accordion)
        const NavItem = ({ label, selected = false, onClick }) => {
            const [isHovered, setIsHovered] = useState(false);

            const styles = {
                display: 'flex',
                alignItems: 'center',
                padding: '12px 16px 12px 48px',
                width: '100%',
                cursor: 'pointer',
                fontFamily: "'Roboto', sans-serif",
                fontWeight: 400,
                fontSize: '14px',
                lineHeight: '20px',
                color: selected ? colors.purple900 : colors.black,
                background: selected ? colors.lightBlue100 : (isHovered ? colors.lightBlue100 : 'transparent'),
                border: 'none',
                textAlign: 'left',
                overflow: 'hidden',
                textOverflow: 'ellipsis',
                whiteSpace: 'nowrap',
                transition: 'background 0.15s ease',
            };

            return (
                <button
                    style={styles}
                    onClick={onClick}
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                >
                    {label}
                </button>
            );
        };

        // Navigation Header Component (accordion parent item)
        const NavHeader = ({ icon, label, hasChildren = false, isExpanded = false, onClick }) => {
            const [isHovered, setIsHovered] = useState(false);

            const styles = {
                display: 'flex',
                alignItems: 'center',
                gap: '8px',
                padding: '12px 8px 12px 16px',
                width: '100%',
                cursor: 'pointer',
                fontFamily: "'Roboto', sans-serif",
                fontWeight: 500,
                fontSize: '14px',
                lineHeight: '20px',
                color: colors.black,
                background: isHovered ? colors.lightBlue100 : 'transparent',
                border: 'none',
                textAlign: 'left',
                transition: 'background 0.15s ease',
            };

            const iconStyles = {
                flexShrink: 0,
                width: '24px',
                height: '24px',
                color: colors.gray06,
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
            };

            const labelStyles = {
                flex: 1,
                minWidth: 0,
            };

            const chevronStyles = {
                flexShrink: 0,
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                color: colors.gray06,
                transition: 'transform 0.2s ease',
            };

            return (
                <button
                    style={styles}
                    onClick={onClick}
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                >
                    <span style={iconStyles}>{icon}</span>
                    <span style={labelStyles}>{label}</span>
                    {hasChildren && (
                        <span style={chevronStyles}>
                            {isExpanded ? <ChevronUpIcon /> : <ChevronDownIcon />}
                        </span>
                    )}
                </button>
            );
        };

        // Accordion Section Component
        const AccordionSection = ({ icon, label, children, defaultExpanded = false }) => {
            const [isExpanded, setIsExpanded] = useState(defaultExpanded);
            const hasChildren = React.Children.count(children) > 0;

            const containerStyles = {
                display: 'flex',
                flexDirection: 'column',
                width: '100%',
                borderBottom: hasChildren && isExpanded ? `1px solid ${colors.gray03}` : 'none',
                paddingBottom: hasChildren && isExpanded ? '14px' : '0',
            };

            return (
                <div style={containerStyles}>
                    <NavHeader
                        icon={icon}
                        label={label}
                        hasChildren={hasChildren}
                        isExpanded={isExpanded}
                        onClick={() => hasChildren && setIsExpanded(!isExpanded)}
                    />
                    {hasChildren && isExpanded && (
                        <div style={{ display: 'flex', flexDirection: 'column' }}>
                            {children}
                        </div>
                    )}
                </div>
            );
        };

        // Left Sidebar Component
        const LeftSidebar = ({ 
            children, 
            collapsed = false,
            onToggleCollapse,
            width = 264,
        }) => {
            const containerStyles = {
                display: 'flex',
                flexDirection: 'column',
                width: collapsed ? '64px' : `${width}px`,
                height: '100%',
                background: colors.white,
                borderRight: `1px solid ${colors.gray03}`,
                boxShadow: '0px 2px 20px rgba(0, 0, 0, 0.08)',
                paddingTop: '12px',
                transition: 'width 0.2s ease',
                overflow: 'hidden',
            };

            const menuStyles = {
                flex: 1,
                display: 'flex',
                flexDirection: 'column',
                overflowX: 'hidden',
                overflowY: 'auto',
                minHeight: 0,
            };

            const footerStyles = {
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'flex-end',
                padding: '8px 16px',
                borderTop: `1px solid ${colors.gray03}`,
                flexShrink: 0,
                height: '40px',
            };

            const collapseButtonStyles = {
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                width: '24px',
                height: '24px',
                color: colors.gray06,
                background: 'transparent',
                border: 'none',
                cursor: 'pointer',
                padding: 0,
            };

            return (
                <div style={containerStyles}>
                    <div style={menuStyles}>
                        {children}
                    </div>
                    {onToggleCollapse && (
                        <div style={footerStyles}>
                            <button style={collapseButtonStyles} onClick={onToggleCollapse}>
                                {collapsed ? <ExpandIcon /> : <CollapseIcon />}
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // Demo App
        const App = () => {
            const [selectedItem, setSelectedItem] = useState('Pre-admission coordinator');
            const [collapsed, setCollapsed] = useState(false);

            return (
                <div className="page-container">
                    <a href="../../kipu-design-system-components.html" className="back-link">
                        ← Back to Components
                    </a>
                    
                    <header className="component-header">
                        <div className="breadcrumb">
                            <a href="../../kipu-design-system-components.html">Components</a>
                            <span>/</span>
                            <span>Navigation</span>
                            <span>/</span>
                            <span>Left Sidebar</span>
                        </div>
                        <h1>Left Sidebar Navigation</h1>
                        <p className="description">
                            In-product left-side navigation bar with accordion sections for organizing menu items.
                            Features expandable/collapsible sections, hover states, and selected item highlighting.
                        </p>
                    </header>

                    <section className="component-section">
                        <h2>Default State</h2>
                        <div className="preview-area" style={{ background: '#F5F5F5', padding: 0 }}>
                            <div style={{ height: '500px', display: 'flex' }}>
                                <LeftSidebar onToggleCollapse={() => setCollapsed(!collapsed)} collapsed={collapsed}>
                                    <AccordionSection icon={<HomeIcon />} label="Dashboard" />
                                    <AccordionSection icon={<DashboardIcon />} label="Apps" defaultExpanded>
                                        <NavItem 
                                            label="Pre-admission coordinator" 
                                            selected={selectedItem === 'Pre-admission coordinator'}
                                            onClick={() => setSelectedItem('Pre-admission coordinator')}
                                        />
                                        <NavItem 
                                            label="Admissions" 
                                            selected={selectedItem === 'Admissions'}
                                            onClick={() => setSelectedItem('Admissions')}
                                        />
                                        <NavItem 
                                            label="Utilization review coordinator" 
                                            selected={selectedItem === 'Utilization review coordinator'}
                                            onClick={() => setSelectedItem('Utilization review coordinator')}
                                        />
                                        <NavItem 
                                            label="Clinical documentation" 
                                            selected={selectedItem === 'Clinical documentation'}
                                            onClick={() => setSelectedItem('Clinical documentation')}
                                        />
                                        <NavItem 
                                            label="Director of compliance" 
                                            selected={selectedItem === 'Director of compliance'}
                                            onClick={() => setSelectedItem('Director of compliance')}
                                        />
                                    </AccordionSection>
                                    <AccordionSection icon={<AnalyticsIcon />} label="Analytics">
                                        <NavItem 
                                            label="Reports" 
                                            selected={selectedItem === 'Reports'}
                                            onClick={() => setSelectedItem('Reports')}
                                        />
                                        <NavItem 
                                            label="Dashboards" 
                                            selected={selectedItem === 'Dashboards'}
                                            onClick={() => setSelectedItem('Dashboards')}
                                        />
                                    </AccordionSection>
                                    <AccordionSection icon={<SettingsIcon />} label="Admin" />
                                    <AccordionSection icon={<KnowledgeIcon />} label="Knowledge">
                                        <NavItem 
                                            label="Documentation" 
                                            selected={selectedItem === 'Documentation'}
                                            onClick={() => setSelectedItem('Documentation')}
                                        />
                                        <NavItem 
                                            label="Training" 
                                            selected={selectedItem === 'Training'}
                                            onClick={() => setSelectedItem('Training')}
                                        />
                                    </AccordionSection>
                                </LeftSidebar>
                                <div style={{ flex: 1, padding: '24px', fontFamily: "'Roboto', sans-serif" }}>
                                    <p style={{ color: '#666' }}>Selected: <strong>{selectedItem}</strong></p>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="component-section">
                        <h2>Design Specifications</h2>
                        <table className="props-table">
                            <thead>
                                <tr>
                                    <th>Element</th>
                                    <th>Property</th>
                                    <th>Value</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td rowSpan="5"><strong>Container</strong></td>
                                    <td>Width</td>
                                    <td><code>264px</code></td>
                                </tr>
                                <tr>
                                    <td>Background</td>
                                    <td><code>#FFFFFF</code></td>
                                </tr>
                                <tr>
                                    <td>Border Right</td>
                                    <td><code>1px solid #ECECEC</code></td>
                                </tr>
                                <tr>
                                    <td>Box Shadow</td>
                                    <td><code>0px 2px 20px rgba(0,0,0,0.08)</code></td>
                                </tr>
                                <tr>
                                    <td>Padding Top</td>
                                    <td><code>12px</code></td>
                                </tr>
                                <tr>
                                    <td rowSpan="5"><strong>Nav Header</strong></td>
                                    <td>Padding</td>
                                    <td><code>12px 8px 12px 16px</code></td>
                                </tr>
                                <tr>
                                    <td>Gap</td>
                                    <td><code>8px</code></td>
                                </tr>
                                <tr>
                                    <td>Font</td>
                                    <td><code>Roboto Medium 14px, line-height 20px</code></td>
                                </tr>
                                <tr>
                                    <td>Icon Size</td>
                                    <td><code>24×24px</code>, color: <code>#666666</code></td>
                                </tr>
                                <tr>
                                    <td>Chevron Size</td>
                                    <td><code>20×20px</code></td>
                                </tr>
                                <tr>
                                    <td rowSpan="4"><strong>Nav Item (child)</strong></td>
                                    <td>Padding</td>
                                    <td><code>12px 16px 12px 48px</code></td>
                                </tr>
                                <tr>
                                    <td>Font</td>
                                    <td><code>Roboto Regular 14px, line-height 20px</code></td>
                                </tr>
                                <tr>
                                    <td>Selected Bg</td>
                                    <td><code>#EFF5FF</code> (Light Blue 100)</td>
                                </tr>
                                <tr>
                                    <td>Selected Text</td>
                                    <td><code>#2D0A54</code> (Purple 900)</td>
                                </tr>
                                <tr>
                                    <td rowSpan="2"><strong>Collapse Footer</strong></td>
                                    <td>Height</td>
                                    <td><code>40px</code></td>
                                </tr>
                                <tr>
                                    <td>Border Top</td>
                                    <td><code>1px solid #ECECEC</code></td>
                                </tr>
                            </tbody>
                        </table>
                    </section>

                    <section className="component-section">
                        <h2>Color Tokens</h2>
                        <table className="props-table">
                            <thead>
                                <tr>
                                    <th>Token</th>
                                    <th>Value</th>
                                    <th>Usage</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><code>white</code></td>
                                    <td><code>#FFFFFF</code></td>
                                    <td>Container background</td>
                                </tr>
                                <tr>
                                    <td><code>black</code></td>
                                    <td><code>#000000</code></td>
                                    <td>Text color (default)</td>
                                </tr>
                                <tr>
                                    <td><code>gray-03</code></td>
                                    <td><code>#ECECEC</code></td>
                                    <td>Borders, dividers</td>
                                </tr>
                                <tr>
                                    <td><code>gray-06</code></td>
                                    <td><code>#666666</code></td>
                                    <td>Icon color</td>
                                </tr>
                                <tr>
                                    <td><code>light-blue-100</code></td>
                                    <td><code>#EFF5FF</code></td>
                                    <td>Hover & selected background</td>
                                </tr>
                                <tr>
                                    <td><code>purple-900</code></td>
                                    <td><code>#2D0A54</code></td>
                                    <td>Selected text color</td>
                                </tr>
                            </tbody>
                        </table>
                    </section>

                    <section className="component-section">
                        <h2>Component Props</h2>
                        
                        <h3 style={{ marginTop: '24px', marginBottom: '12px' }}>LeftSidebar</h3>
                        <table className="props-table">
                            <thead>
                                <tr>
                                    <th>Prop</th>
                                    <th>Type</th>
                                    <th>Default</th>
                                    <th>Description</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><code>children</code></td>
                                    <td><code>ReactNode</code></td>
                                    <td>-</td>
                                    <td>AccordionSection components</td>
                                </tr>
                                <tr>
                                    <td><code>collapsed</code></td>
                                    <td><code>boolean</code></td>
                                    <td><code>false</code></td>
                                    <td>Whether sidebar is collapsed</td>
                                </tr>
                                <tr>
                                    <td><code>onToggleCollapse</code></td>
                                    <td><code>function</code></td>
                                    <td>-</td>
                                    <td>Collapse toggle handler</td>
                                </tr>
                                <tr>
                                    <td><code>width</code></td>
                                    <td><code>number</code></td>
                                    <td><code>264</code></td>
                                    <td>Width in pixels</td>
                                </tr>
                            </tbody>
                        </table>

                        <h3 style={{ marginTop: '24px', marginBottom: '12px' }}>AccordionSection</h3>
                        <table className="props-table">
                            <thead>
                                <tr>
                                    <th>Prop</th>
                                    <th>Type</th>
                                    <th>Default</th>
                                    <th>Description</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><code>icon</code></td>
                                    <td><code>ReactNode</code></td>
                                    <td>-</td>
                                    <td>Icon element (24×24)</td>
                                </tr>
                                <tr>
                                    <td><code>label</code></td>
                                    <td><code>string</code></td>
                                    <td>-</td>
                                    <td>Section label</td>
                                </tr>
                                <tr>
                                    <td><code>children</code></td>
                                    <td><code>ReactNode</code></td>
                                    <td>-</td>
                                    <td>NavItem components</td>
                                </tr>
                                <tr>
                                    <td><code>defaultExpanded</code></td>
                                    <td><code>boolean</code></td>
                                    <td><code>false</code></td>
                                    <td>Initial expanded state</td>
                                </tr>
                            </tbody>
                        </table>

                        <h3 style={{ marginTop: '24px', marginBottom: '12px' }}>NavItem</h3>
                        <table className="props-table">
                            <thead>
                                <tr>
                                    <th>Prop</th>
                                    <th>Type</th>
                                    <th>Default</th>
                                    <th>Description</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><code>label</code></td>
                                    <td><code>string</code></td>
                                    <td>-</td>
                                    <td>Item label text</td>
                                </tr>
                                <tr>
                                    <td><code>selected</code></td>
                                    <td><code>boolean</code></td>
                                    <td><code>false</code></td>
                                    <td>Whether item is selected</td>
                                </tr>
                                <tr>
                                    <td><code>onClick</code></td>
                                    <td><code>function</code></td>
                                    <td>-</td>
                                    <td>Click event handler</td>
                                </tr>
                            </tbody>
                        </table>
                    </section>

                    <section className="component-section">
                        <h2>Usage</h2>
                        <div className="code-block">
{`import { LeftSidebar, AccordionSection, NavItem } from '@kipu/design-system';

<LeftSidebar onToggleCollapse={handleToggle} collapsed={isCollapsed}>
  <AccordionSection icon={<HomeIcon />} label="Dashboard" />
  
  <AccordionSection icon={<AppsIcon />} label="Apps" defaultExpanded>
    <NavItem 
      label="Pre-admission coordinator" 
      selected={selectedItem === 'Pre-admission coordinator'}
      onClick={() => setSelectedItem('Pre-admission coordinator')}
    />
    <NavItem 
      label="Admissions" 
      selected={selectedItem === 'Admissions'}
      onClick={() => setSelectedItem('Admissions')}
    />
  </AccordionSection>
  
  <AccordionSection icon={<SettingsIcon />} label="Admin" />
</LeftSidebar>`}
                        </div>
                    </section>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
